name: Deploy interactive book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # The deploy gate validates the PUBLISHED SITE (files, script bindings,
      # internal links, claim controls, and prohibited epistemic overclaims).
      # Full research-artifact integrity (mechanism/capacity generators, etc.)
      # runs separately in research-integrity.yml so the site can still ship
      # while the experimental research pipeline is mid-iteration. Publishing
      # must not be blocked by an in-progress generated-artifact migration.
      - name: Validate the published site
        run: node scripts/validate-site.mjs
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
